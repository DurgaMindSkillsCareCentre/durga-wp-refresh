name: WordPress Weekly Content Refresh

on:
  schedule:
    - cron: '0 5 * * 1'   # Every Monday 5:00 UTC (~10:30 AM IST)
  workflow_dispatch:        # lets you also trigger it manually from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run refresh script
        env:
          WP_SITE: ${{ secrets.WP_SITE }}
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
        run: python refresh_post.py

      - name: Email weekly summary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Durga WordPress Weekly Refresh"
          to: smartpos.systems@gmail.com
          from: Durga WP Refresh Bot
          body: file://summary.txt
